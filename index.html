<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VEX Match Schedule</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #232636;
      --border: #2e3147;
      --text: #e8eaf0;
      --text-muted: #7b8099;
      --blue: #3a7bd5;
      --blue-bg: #1a2a4a;
      --blue-light: #6fa3f7;
      --red: #d53a3a;
      --red-bg: #4a1a1a;
      --red-light: #f76f6f;
      --accent: #7c6af7;
      --green: #3ada7a;
      --yellow: #f7c96a;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--text);
    }

    .logo span { color: var(--accent); }

    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 8px 16px;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:hover { opacity: 0.85; }
    button:active { transform: scale(0.97); }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-ghost {
      background: var(--surface2);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover { color: var(--text); }

    .btn-icon {
      width: 36px;
      height: 36px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface2);
      color: var(--text-muted);
      border: 1px solid var(--border);
      font-size: 1rem;
    }

    /* SETTINGS MODAL */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    .modal-backdrop.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px;
      width: 420px;
      max-width: 95vw;
      box-shadow: var(--shadow);
    }

    .modal h2 {
      font-size: 1.05rem;
      margin-bottom: 20px;
      color: var(--text);
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.9rem;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--text-muted); }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 24px;
    }

    /* MAIN CONTENT */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 20px;
    }

    .page-header {
      margin-bottom: 24px;
    }

    .page-header h1 {
      font-size: 1.4rem;
      font-weight: 700;
    }

    .page-header p {
      color: var(--text-muted);
      font-size: 0.88rem;
      margin-top: 4px;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .pill {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.78rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .pill .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
    }

    .pill.live .dot { background: var(--green); animation: pulse 1.5s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* MATCH GRID */
    .match-grid {
      display: grid;
      gap: 12px;
    }

    .match-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.15s;
    }

    .match-card:hover { border-color: #3e4260; }

    .match-card.completed { opacity: 0.75; }

    .match-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }

    .match-name {
      font-weight: 700;
      font-size: 0.9rem;
    }

    .match-meta {
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .match-time {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .match-field {
      font-size: 0.78rem;
      color: var(--text-muted);
      background: var(--bg);
      border-radius: 4px;
      padding: 2px 8px;
    }

    .match-status {
      font-size: 0.73rem;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 5px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .match-status.upcoming {
      background: rgba(124, 106, 247, 0.15);
      color: var(--accent);
    }

    .match-status.completed {
      background: rgba(58, 218, 122, 0.12);
      color: var(--green);
    }

    .match-status.practice {
      background: rgba(247, 201, 106, 0.12);
      color: var(--yellow);
    }

    .match-body {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: stretch;
    }

    .alliance {
      padding: 16px;
    }

    .alliance.blue { border-left: 3px solid var(--blue); }
    .alliance.red { border-right: 3px solid var(--red); }

    .alliance-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    .alliance.blue .alliance-label { color: var(--blue-light); }
    .alliance.red .alliance-label { color: var(--red-light); }

    .team-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .team-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 6px 10px;
      border-radius: 7px;
      background: var(--bg);
      border: 1px solid var(--border);
      width: fit-content;
    }

    .team-chip.our-team.blue {
      background: var(--blue-bg);
      border-color: var(--blue);
      color: var(--blue-light);
    }

    .team-chip.our-team.red {
      background: var(--red-bg);
      border-color: var(--red);
      color: var(--red-light);
    }

    .team-chip .star {
      font-size: 0.65rem;
      opacity: 0.7;
    }

    .score-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px 20px;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      min-width: 100px;
      gap: 4px;
    }

    .score-display {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .score-val {
      font-size: 1.6rem;
      font-weight: 800;
      line-height: 1;
    }

    .score-val.blue { color: var(--blue-light); }
    .score-val.red { color: var(--red-light); }

    .score-sep {
      font-size: 1.1rem;
      color: var(--text-muted);
      font-weight: 300;
    }

    .score-label {
      font-size: 0.7rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 2px;
    }

    .score-pending {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-style: italic;
    }

    /* WINNER INDICATOR */
    .match-card.win-blue .alliance.blue { background: rgba(58, 123, 213, 0.07); }
    .match-card.win-red .alliance.red { background: rgba(213, 58, 58, 0.07); }

    .score-val.our-win { font-weight: 900; text-shadow: 0 0 12px currentColor; }
    .score-val.our-loss { font-weight: 400; opacity: 0.6; box-shadow: 0 0 0 2px currentColor; border-radius: 4px; padding: 0 4px; }

    /* EMPTY / LOADING / ERROR STATES */
    .state-box {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .state-box .icon { font-size: 2.5rem; margin-bottom: 12px; }
    .state-box h3 { font-size: 1rem; margin-bottom: 6px; color: var(--text); }
    .state-box p { font-size: 0.85rem; }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* RESPONSIVE */
    @media (max-width: 600px) {
      .match-body { grid-template-columns: 1fr; }
      .score-center {
        border: none;
        border-top: 1px solid var(--border);
        border-bottom: 1px solid var(--border);
        padding: 12px;
        flex-direction: row;
        justify-content: space-between;
        min-width: unset;
      }
      .match-meta { gap: 8px; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">VEX <span>Match Schedule</span></div>
  <div class="header-actions">
    <button class="btn-icon" id="refreshBtn" title="Refresh">&#8635;</button>
    <button class="btn-primary" id="settingsBtn">&#9881; Settings</button>
  </div>
</header>

<!-- SETTINGS MODAL -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <h2>Settings</h2>
    <div class="form-group">
      <label>API Token</label>
      <input type="password" id="apiTokenInput" placeholder="Paste your x-api-token here" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Team ID</label>
        <input type="text" id="teamIdInput" placeholder="e.g. 96957" />
      </div>
      <div class="form-group">
        <label>Event ID</label>
        <input type="text" id="eventIdInput" placeholder="e.g. 64025" />
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" id="cancelBtn">Cancel</button>
      <button class="btn-primary" id="saveBtn">Save &amp; Fetch</button>
    </div>
  </div>
</div>

<!-- MAIN -->
<main>
  <div class="page-header">
    <h1 id="eventTitle">Match Schedule</h1>
    <p id="eventSubtitle">Configure settings to load matches.</p>
  </div>

  <div class="status-bar" id="statusBar" style="display:none">
    <div class="pill" id="teamPill"><span class="dot"></span> <span id="teamPillText">-</span></div>
    <div class="pill" id="eventPill"><span>Event</span> <span id="eventPillText">-</span></div>
    <div class="pill live" id="lastFetchPill"><span class="dot"></span> <span id="lastFetchText">-</span></div>
    <button class="btn-ghost" id="autoRefreshBtn" style="font-size:0.78rem;padding:4px 12px;">Auto-refresh: OFF</button>
  </div>

  <div id="matchContainer">
    <div class="state-box">
      <div class="icon">&#128295;</div>
      <h3>No settings configured</h3>
      <p>Click <strong>Settings</strong> to enter your API token, team ID, and event ID.</p>
    </div>
  </div>
</main>

<script>
  const STORAGE_KEYS = { apiToken: 'vex_apiToken', teamId: 'vex_teamId', eventId: 'vex_eventId' };

  // --- STATE ---
  let state = {
    apiToken: localStorage.getItem(STORAGE_KEYS.apiToken) || '',
    teamId: localStorage.getItem(STORAGE_KEYS.teamId) || '96957',
    eventId: localStorage.getItem(STORAGE_KEYS.eventId) || '64025',
    autoRefresh: false,
    refreshInterval: null,
  };

  // --- DOM REFS ---
  const $ = id => document.getElementById(id);
  const modal = $('modalBackdrop');
  const container = $('matchContainer');

  // --- MODAL ---
  $('settingsBtn').addEventListener('click', openModal);
  $('cancelBtn').addEventListener('click', closeModal);
  $('saveBtn').addEventListener('click', saveSettings);
  modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

  $('refreshBtn').addEventListener('click', () => fetchMatches());

  $('autoRefreshBtn').addEventListener('click', () => {
    state.autoRefresh = !state.autoRefresh;
    $('autoRefreshBtn').textContent = `Auto-refresh: ${state.autoRefresh ? 'ON (30s)' : 'OFF'}`;
    if (state.autoRefresh) {
      state.refreshInterval = setInterval(fetchMatches, 30000);
    } else {
      clearInterval(state.refreshInterval);
    }
  });

  function openModal() {
    $('apiTokenInput').value = state.apiToken;
    $('teamIdInput').value = state.teamId;
    $('eventIdInput').value = state.eventId;
    modal.classList.add('open');
    $('apiTokenInput').focus();
  }

  function closeModal() {
    modal.classList.remove('open');
  }

  function saveSettings() {
    state.apiToken = $('apiTokenInput').value.trim();
    state.teamId = $('teamIdInput').value.trim();
    state.eventId = $('eventIdInput').value.trim();
    localStorage.setItem(STORAGE_KEYS.apiToken, state.apiToken);
    localStorage.setItem(STORAGE_KEYS.teamId, state.teamId);
    localStorage.setItem(STORAGE_KEYS.eventId, state.eventId);
    closeModal();
    fetchMatches();
  }

  // --- FETCH ---
  async function fetchMatches() {
    if (!state.teamId || !state.eventId) {
      openModal();
      return;
    }

    setLoading();

    const url = `/api/matches?teamId=${encodeURIComponent(state.teamId)}&eventId=${encodeURIComponent(state.eventId)}`;

    try {
      const headers = { 'Accept': 'application/json' };
      if (state.apiToken) headers['x-api-token'] = state.apiToken;

      const res = await fetch(url, { headers });

      if (!res.ok) {
        if (res.status === 401) throw new Error('Invalid API token (401). Update your token in Settings.');
        throw new Error(`API error: ${res.status} ${res.statusText}`);
      }

      const matches = await res.json();
      renderMatches(matches);
      updateStatusBar(matches);

    } catch (err) {
      setError(err.message);
    }
  }

  function setLoading() {
    container.innerHTML = `
      <div class="state-box">
        <div class="spinner"></div>
        <h3>Loading matches…</h3>
        <p>Fetching from RobotEvents API</p>
      </div>`;
  }

  function setError(msg) {
    container.innerHTML = `
      <div class="state-box">
        <div class="icon">&#9888;</div>
        <h3>Failed to load matches</h3>
        <p>${escHtml(msg)}</p>
      </div>`;
  }

  // --- RENDER ---
  function renderMatches(matches) {
    if (!matches.length) {
      container.innerHTML = `
        <div class="state-box">
          <div class="icon">&#128204;</div>
          <h3>No matches found</h3>
          <p>No matches for team ${escHtml(state.teamId)} in event ${escHtml(state.eventId)}.</p>
        </div>`;
      return;
    }

    const ourTeamId = parseInt(state.teamId, 10);

    // Group by day
    const byDay = {};
    for (const m of matches) {
      const day = m.scheduled ? formatDay(m.scheduled) : 'Unscheduled';
      (byDay[day] = byDay[day] || []).push(m);
    }

    const firstMatch = matches[0];
    $('eventTitle').textContent = firstMatch.event?.name || 'Match Schedule';
    $('eventSubtitle').textContent = `${firstMatch.division?.name ? 'Division: ' + firstMatch.division.name + ' · ' : ''}${matches.length} matches`;

    let html = '';
    for (const [day, dayMatches] of Object.entries(byDay)) {
      html += `<div style="font-size:0.78rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;padding:16px 0 8px;">${escHtml(day)}</div>`;
      html += `<div class="match-grid">`;
      for (const match of dayMatches) {
        html += renderMatchCard(match, ourTeamId);
      }
      html += `</div>`;
    }

    container.innerHTML = html;
  }

  function renderMatchCard(match, ourTeamId) {
    const blue = match.alliances.find(a => a.color === 'blue');
    const red  = match.alliances.find(a => a.color === 'red');
    const isPractice = match.round === 1;
    const isStarted = !!match.started;
    const hasScore = isStarted; // scores show after start
    const blueWins = hasScore && blue?.score > red?.score;
    const redWins  = hasScore && red?.score > blue?.score;
    const winClass = blueWins ? 'win-blue' : redWins ? 'win-red' : '';
    const cardClass = [isStarted ? 'completed' : '', winClass].filter(Boolean).join(' ');

    const statusLabel = isPractice
      ? `<span class="match-status practice">Practice</span>`
      : isStarted
        ? `<span class="match-status completed">Completed</span>`
        : `<span class="match-status upcoming">Upcoming</span>`;

    return `
      <div class="match-card ${cardClass}">
        <div class="match-header">
          <span class="match-name">${escHtml(match.name)}</span>
          <div class="match-meta">
            <span class="match-field">${escHtml(match.field || '-')}</span>
            <span class="match-time">${match.scheduled ? formatTime(match.scheduled) : '-'}</span>
            ${statusLabel}
          </div>
        </div>
        <div class="match-body">
          ${renderAlliance(blue, 'blue', ourTeamId)}
          ${renderScoreCenter(blue, red, hasScore, ourTeamId)}
          ${renderAlliance(red, 'red', ourTeamId)}
        </div>
      </div>`;
  }

  function renderAlliance(alliance, color, ourTeamId) {
    if (!alliance) return `<div class="alliance ${color}"></div>`;
    const teams = alliance.teams.map(t => {
      const isOurs = t.team.id === ourTeamId;
      return `<div class="team-chip ${isOurs ? `our-team ${color}` : ''}" title="${escHtml(t.team.name)}">
        ${isOurs ? '<span class="star">★</span>' : ''}
        ${escHtml(t.team.name)}
      </div>`;
    }).join('');
    return `
      <div class="alliance ${color}">
        <div class="alliance-label">${color} alliance</div>
        <div class="team-list">${teams}</div>
      </div>`;
  }

  function renderScoreCenter(blue, red, hasScore, ourTeamId) {
    if (!hasScore) {
      return `
        <div class="score-center">
          <span class="score-pending">vs</span>
        </div>`;
    }

    const ourAlliance = blue?.teams.some(t => t.team.id === ourTeamId) ? 'blue'
      : red?.teams.some(t => t.team.id === ourTeamId) ? 'red'
      : null;
    const ourScore = ourAlliance === 'blue' ? blue?.score : red?.score;
    const theirScore = ourAlliance === 'blue' ? red?.score : blue?.score;
    const weWon = ourAlliance && ourScore > theirScore;
    const weLost = ourAlliance && ourScore < theirScore;

    const blueClass = ourAlliance === 'blue' ? (weWon ? ' our-win' : weLost ? ' our-loss' : '') : '';
    const redClass  = ourAlliance === 'red'  ? (weWon ? ' our-win' : weLost ? ' our-loss' : '') : '';

    return `
      <div class="score-center">
        <div class="score-display">
          <span class="score-val blue${blueClass}">${blue?.score ?? '-'}</span>
          <span class="score-sep">:</span>
          <span class="score-val red${redClass}">${red?.score ?? '-'}</span>
        </div>
        <div class="score-label">Blue · Red</div>
      </div>`;
  }

  // --- STATUS BAR ---
  function updateStatusBar(matches) {
    $('statusBar').style.display = 'flex';
    $('teamPillText').textContent = `Team ${state.teamId}`;
    $('eventPillText').textContent = state.eventId;
    $('lastFetchText').textContent = 'Updated ' + new Date().toLocaleTimeString();

    // Find our team name
    const ourTeamId = parseInt(state.teamId, 10);
    for (const m of matches) {
      for (const a of m.alliances) {
        const t = a.teams.find(t => t.team.id === ourTeamId);
        if (t) { $('teamPillText').textContent = t.team.name; break; }
      }
    }
  }

  // --- UTILS ---
  function formatDay(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  }

  function formatTime(iso) {
    const d = new Date(iso);
    return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // --- INIT ---
  if (state.teamId && state.eventId) {
    fetchMatches();
  } else {
    openModal();
  }
</script>
</body>
</html>
